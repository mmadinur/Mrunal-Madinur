  <!-- =====================================================
     CONSTELLATION TRAIL
     Dots connect with lines as you move the mouse,
     forming a star-map style trail that fades out
     ===================================================== -->
<script>
  let dots = [];
  const MAX_DOTS = 12;
  const MAX_DIST = 80;

  document.addEventListener('mousemove', (e) => {
    // Create a new dot at cursor position
    const dot = document.createElement('div');
    dot.style.cssText = `
      position: fixed;
      width: 3px;
      height: 3px;
      background: rgba(255,255,255,0.8);
      border-radius: 50%;
      left: ${e.clientX}px;
      top: ${e.clientY}px;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 9997;
    `;
    document.body.appendChild(dot);
    dots.push({ el: dot, x: e.clientX, y: e.clientY });

    // Remove oldest dot if over limit
    if (dots.length > MAX_DOTS) {
      const old = dots.shift();
      old.el.remove();
    }

    // Remove old lines
    document.querySelectorAll('.c-line').forEach(l => l.remove());

    // Draw lines between nearby dots
    for (let i = 1; i < dots.length; i++) {
      const a = dots[i - 1];
      const b = dots[i];
      const dist = Math.hypot(b.x - a.x, b.y - a.y);
      if (dist < MAX_DIST) {
        const opacity = 0.18 * (1 - dist / MAX_DIST);
        const angle = Math.atan2(b.y - a.y, b.x - a.x) * 180 / Math.PI;
        const line = document.createElement('div');
        line.className = 'c-line';
        line.style.cssText = `
          position: fixed;
          height: 1px;
          background: rgba(255,255,255,${opacity});
          width: ${dist}px;
          left: ${a.x}px;
          top: ${a.y}px;
          transform-origin: 0 50%;
          transform: rotate(${angle}deg);
          pointer-events: none;
          z-index: 9996;
        `;
        document.body.appendChild(line);
      }
    }
  });

  // Fade out and remove all dots and lines when cursor leaves page
  document.addEventListener('mouseleave', () => {
    dots.forEach(d => d.el.remove());
    document.querySelectorAll('.c-line').forEach(l => l.remove());
    dots = [];
  });
</script>

<!-- =====================================================
     READING PROGRESS BAR
     Thin white line at top of page that fills as you scroll
     ===================================================== -->
<script>
  const bar = document.createElement('div');
  bar.style.cssText = `
    position: fixed;
    top: 0;
    left: 0;
    height: 2px;
    width: 0%;
    background: rgba(255,255,255,0.7);
    z-index: 9999;
    border-radius: 0 2px 2px 0;
    transition: width 0.05s linear;
    pointer-events: none;
  `;
  document.body.appendChild(bar);

  // Update bar width based on how far down the page you've scrolled
  window.addEventListener('scroll', () => {
    const scrollTop = window.scrollY;
    const docHeight = document.documentElement.scrollHeight - window.innerHeight;
    const pct = docHeight > 0 ? (scrollTop / docHeight) * 100 : 0;
    bar.style.width = pct + '%';
  });
</script>


</script>

  <!-- =====================================================
     LIGHT / DARK MODE TOGGLE
     ===================================================== -->
<script>
  const toggle = document.getElementById('themeToggle');
  const icon = document.getElementById('themeIcon');

  const moonPath = '<path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79z"/>';
  const sunPath = '<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>';

  if (localStorage.getItem('theme') === 'light') {
    document.documentElement.classList.add('light');
    icon.innerHTML = sunPath;
  }

  toggle.addEventListener('click', () => {
    const isLight = document.documentElement.classList.toggle('light');
    localStorage.setItem('theme', isLight ? 'light' : 'dark');
    icon.innerHTML = isLight ? sunPath : moonPath;
  });
</script>
